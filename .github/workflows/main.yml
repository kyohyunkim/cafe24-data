name: Hourly Data Update

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 2026년 최신 v4 버전 사용 (Node.js 24 지원)
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 최신 노드 버전으로 업그레이드

      - name: Install dependencies
        run: npm install

      - name: Run update script
        run: node update.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add data.json
          # 변경사항이 있을 때만 커밋하고, 없으면 에러 없이 종료(exit 0)합니다.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update data.json" && git push origin main --force)
